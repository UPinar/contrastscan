name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install -q ruff

      - name: Ruff check
        run: ruff check app/

      - name: Ruff format check
        run: ruff format --check app/

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: ~/apt-cache
          key: apt-${{ runner.os }}-v1

      - name: Install C dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc make libcurl4-openssl-dev libssl-dev libcjson-dev

      - name: Compile scanner
        run: make
        working-directory: scanner

      - name: Run C unit tests
        run: make test
        working-directory: scanner

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -q -r requirements.txt

      - name: Run Python tests
        env:
          CONTRASTSCAN_DB: /tmp/ci_test.db
        run: cd app && python -m pytest tests/ -v --tb=short

  integration:
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - name: Install C dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc make libcurl4-openssl-dev libssl-dev libcjson-dev jq

      - name: Compile scanner
        run: make
        working-directory: scanner

      - name: Run scanner integration tests
        run: bash tests/test_integration.sh
        working-directory: scanner
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -q -r requirements.txt

      - name: Start app with real binary
        env:
          CONTRASTSCAN_DB: /tmp/ci_integration.db
          CONTRASTSCAN_HASH_SECRET: ci-test-secret
        run: |
          cd app
          python -c "from db import init_db; init_db()"
          uvicorn main:app --host 127.0.0.1 --port 8001 --workers 2 &
          echo $! > /tmp/app.pid
          # Wait for app to be ready (up to 15s)
          for i in $(seq 1 15); do
            curl -sf http://127.0.0.1:8001/ > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Verify scanner binary works
        run: |
          echo "--- Binary version check ---"
          ./scanner/contrastscan --help || true
          echo "--- Test scan against known domain ---"
          timeout 30 ./scanner/contrastscan example.com || echo "Exit code: $?"

      - name: Integration — health and pages
        run: |
          echo "--- Health check ---"
          curl -sf http://127.0.0.1:8001/ > /dev/null && echo "PASS: Homepage 200" || echo "FAIL: Homepage"
          curl -sf http://127.0.0.1:8001/stats > /dev/null && echo "PASS: Stats 200" || echo "FAIL: Stats"
          curl -sf http://127.0.0.1:8001/robots.txt > /dev/null && echo "PASS: robots.txt 200" || echo "FAIL: robots.txt"

      - name: Integration — scan rejects invalid domain
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST http://127.0.0.1:8001/scan \
            -H "Origin: https://contrastcyber.com" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "domain=invalid")
          [ "$STATUS" = "400" ] && echo "PASS: Invalid domain -> 400" || { echo "FAIL: expected 400 got $STATUS"; exit 1; }

      - name: Integration — scan with real binary
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST http://127.0.0.1:8001/scan \
            -H "Origin: https://contrastcyber.com" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "domain=example.com" \
            --max-time 45 -L)
          echo "Scan flow final status: $STATUS"
          # 200 = rendered result page (followed redirect), 302 = redirect to result
          [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] && echo "PASS: Full scan flow" || { echo "FAIL: unexpected status $STATUS"; exit 1; }

      - name: Integration — hidden endpoints blocked
        run: |
          for path in /docs /redoc; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:8001$path")
            [ "$STATUS" = "404" ] && echo "PASS: $path -> 404" || { echo "FAIL: $path -> $STATUS"; exit 1; }
          done

      - name: Cleanup
        if: always()
        run: |
          [ -f /tmp/app.pid ] && kill "$(cat /tmp/app.pid)" 2>/dev/null || true
