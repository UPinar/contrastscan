[nginx-limit-req]
backend = auto
enabled = true
filter = nginx-limit-req
logpath = /var/log/nginx/error.log
maxretry = 5
findtime = 60
bantime = 3600
action = ufw[name=nginx-limit, protocol=tcp, port="80,443"]

[nginx-botsearch]
backend = auto
enabled = true
filter = nginx-botsearch
logpath = /var/log/nginx/access.log
maxretry = 3
findtime = 60
bantime = 86400
action = ufw[name=nginx-bot, protocol=tcp, port="80,443"]

[nginx-exploit]
ignoreip = 173.245.48.0/20 103.21.244.0/22 103.22.200.0/22 103.31.4.0/22 141.101.64.0/18 108.162.192.0/18 190.93.240.0/20 188.114.96.0/20 197.234.240.0/22 198.41.128.0/17 162.158.0.0/15 104.16.0.0/13 104.24.0.0/14 172.64.0.0/13 131.0.72.0/22
backend = auto
enabled = true
filter = nginx-exploit
logpath = /var/log/nginx/access.log
maxretry = 1
findtime = 3600
bantime = 86400
action = ufw[name=nginx-exploit, protocol=tcp, port="80,443"]
